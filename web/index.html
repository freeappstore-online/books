<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1a1a2e" id="theme-color" />
    <meta name="darkreader-lock" />
    <title>FreeBooks - Free Audiobook Reader</title>
    <meta name="description" content="Free audiobook reader with browser-based text-to-speech. Listen to classic literature for free." />
    <script>
      try {
        var theme = localStorage.getItem('freebooks-theme') || 'dark';
        if (theme === 'system') theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
